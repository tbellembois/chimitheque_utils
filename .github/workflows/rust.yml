name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: xd009642/tarpaulin:develop-nightly
      options: --security-opt seccomp=unconfined

    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      # Cache dependencies
      - name: cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: remove Cargo.toml patch section
        run: |
          sed -i '/\[patch.crates-io\]/,/^$/d' Cargo.toml

      - name: build
        run: cargo build --verbose

      - name: run tests
        run: cargo test --verbose

      - name: run clippy
        run: cargo clippy -- -Wclippy::all -Wclippy::pedantic -Aclippy::missing_errors_doc -Aclippy::missing_panics_doc -Aclippy::too_many_lines -Aclippy::struct_excessive_bools

      - name: run tarpaulin
        run: cargo +nightly tarpaulin --rustflags="-C opt-level=0" --verbose --all-features --workspace --timeout 120 --out lcov

      - name: archive code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: lcov.info
